<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BizHub — Đăng nhập Hội viên</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="css/main.css?v=2.1">
<style>
  .login-page-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    position: relative;
    overflow: hidden;
  }
  .ambient-glow {
    position: absolute;
    pointer-events: none;
    z-index: 1;
    border-radius: 50%;
  }
  .login-card {
    background: rgba(15, 27, 53, 0.45);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 16px;
    width: 100%;
    max-width: 440px;
    padding: 2.5rem 2rem;
    box-shadow: var(--shadow-deep);
    z-index: 10;
  }
  .login-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--font-title);
    font-size: 26px;
    font-weight: 800;
    color: #FFFFFF;
    justify-content: center;
    margin-bottom: 2rem;
  }
  .login-logo i {
    color: var(--primary);
  }
  .form-group {
    margin-bottom: 1.25rem;
  }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .form-group input {
    width: 100%;
    background-color: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 8px;
    color: #ffffff;
    font-size: 13.5px;
    padding: 10px 14px;
    outline: none;
    transition: var(--transition);
  }
  .form-group input:focus {
    border-color: var(--primary);
    background-color: rgba(255, 255, 255, 0.05);
    box-shadow: 0 0 12px rgba(30, 136, 229, 0.15);
  }
  .login-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: #ffffff;
    border: none;
    padding: 11px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 1.5rem;
  }
  .login-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 15px rgba(30, 136, 229, 0.3);
  }
  .login-footer {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 12.5px;
    color: var(--text-muted);
  }
  .login-footer a {
    color: var(--neon-cyan);
    font-weight: 600;
    text-decoration: none;
  }
  .login-footer a:hover {
    text-decoration: underline;
  }
  .alert {
    background-color: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.2);
    color: #FCA5A5;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 12px;
    margin-bottom: 1.25rem;
    display: none;
    align-items: center;
    gap: 8px;
  }
</style>
</head>
<body class="public-body">

<div class="login-page-wrap">
  
  <!-- Ambient background glow elements -->
  <div class="ambient-glow" style="top:20%; left:20%; width:350px; height:350px; background:radial-gradient(circle, rgba(30,136,229,0.12) 0%, transparent 70%)"></div>
  <div class="ambient-glow" style="bottom:20%; right:20%; width:300px; height:300px; background:radial-gradient(circle, rgba(0,229,255,0.08) 0%, transparent 70%)"></div>

  <div class="login-card">
    <div class="login-logo">
      <i class="ti ti-building-community"></i>
      <span>BizHub</span>
    </div>
    
    <h2 style="font-family:var(--font-title); font-size:18px; font-weight:700; color:#FFFFFF; margin-bottom:6px; text-align:center">Cổng thông tin Hội viên</h2>
    <p style="font-size:12px; color:var(--text-muted); text-align:center; margin-bottom:1.5rem">Đăng nhập tài khoản doanh nghiệp thành viên để theo dõi quyền lợi & cơ hội giao thương</p>
    
    <div class="alert" id="error-alert">
      <i class="ti ti-alert-triangle" style="font-size:14px"></i>
      <span id="error-text">Sai tài khoản hoặc mật khẩu.</span>
    </div>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="username">Email đăng ký hội viên</label>
        <input type="text" id="username" placeholder="name@company.com" required autocomplete="username">
      </div>
      
      <div class="form-group" style="margin-bottom: 0.5rem;">
        <label for="password">Mật khẩu</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      
      <div style="display:flex; justify-content:flex-end; margin-bottom:1.5rem">
        <a href="#" onclick="alert('Vui lòng liên hệ Hotline BizHub hoặc gửi email về support@bizhub.vn để được cấp lại mật khẩu.')" style="font-size:11.5px; color:var(--text-muted); text-decoration:none">Quên mật khẩu?</a>
      </div>

      <button type="submit" class="login-btn" id="submit-btn">
        <span>Đăng nhập</span>
        <i class="ti ti-arrow-right"></i>
      </button>
    </form>
    
    <div class="login-footer">
      <span>Doanh nghiệp chưa đăng ký?</span>
      <a href="register.html">Gửi hồ sơ ngay</a>
    </div>
  </div>

</div>

<script>
async function handleLogin(event) {
  event.preventDefault();
  
  const userEl = document.getElementById('username');
  const passEl = document.getElementById('password');
  const alertEl = document.getElementById('error-alert');
  const alertText = document.getElementById('error-text');
  const btn = document.getElementById('submit-btn');
  
  alertEl.style.display = 'none';
  btn.disabled = true;
  btn.querySelector('span').textContent = 'Đang đăng nhập...';
  
  try {
    const res = await fetch('/api/member/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: userEl.value.trim(),
        password: passEl.value
      })
    });
    
    const data = await res.json();
    if (!res.ok) {
      throw new Error(data.error || 'Đăng nhập không thành công.');
    }
    
    // Đăng nhập thành công -> lưu token & thông tin hội viên
    localStorage.setItem('bizhub_member_token', data.token);
    localStorage.setItem('bizhub_member_user', JSON.stringify(data.member));
    
    // Chuyển hướng đến dashboard hội viên
    window.location.href = 'member-dashboard.html';
  } catch (err) {
    alertText.textContent = err.message;
    alertEl.style.display = 'flex';
    btn.disabled = false;
    btn.querySelector('span').textContent = 'Đang đăng nhập';
  }
}
</script>
</body>
</html>
