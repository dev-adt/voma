# ─────────────────────────────────────────────────────────────
# Nginx config cho Voma
# Copy vào: /etc/nginx/sites-available/voma.today
# Sau đó: ln -s /etc/nginx/sites-available/voma.today /etc/nginx/sites-enabled/
# Rồi: nginx -t && systemctl reload nginx
# ─────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name voma.today www.voma.today;   # ← đổi thành domain của bạn

    # Redirect HTTP → HTTPS (bật sau khi có SSL)
    # return 301 https://$host$request_uri;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1000;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # ── /api/* → Node.js proxy ────────────────────────────────
    location /api/ {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;

        # Timeout cho AI (có thể lâu hơn request thường)
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── Static files → thư mục public ────────────────────────
    location / {
        root  /var/www/voma.today/public;    # ← đổi thành đường dẫn thực
        index index.html;
        try_files $uri $uri/ /index.html; # SPA fallback
    }

    # Cache ảnh và file tĩnh
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2)$ {
        root    /var/www/voma.today/public;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

