<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BizHub — Thư mục hội viên</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="css/main.css">
</head>
<body class="public-body">

<!-- Decorative background gradient blobs -->
<div style="position:fixed;top:-20%;left:-10%;width:50vw;height:50vw;background:radial-gradient(circle, rgba(79,70,229,0.06) 0%, rgba(79,70,229,0) 70%);z-index:-1;pointer-events:none;border-radius:50%"></div>
<div style="position:fixed;bottom:-20%;right:-10%;width:60vw;height:60vw;background:radial-gradient(circle, rgba(16,185,129,0.04) 0%, rgba(16,185,129,0) 70%);z-index:-1;pointer-events:none;border-radius:50%"></div>

<nav>
  <div class="nav-logo">
    <div class="nav-logo-icon"><i class="ti ti-building-community" aria-hidden="true"></i></div>
    BizHub
  </div>
  <div class="nav-links">
    <a href="index.html#features" class="nav-link">Tính năng</a>
    <a href="index.html#members" class="nav-link">Hội viên</a>
    <a href="index.html#posts" class="nav-link">Bài viết</a>
    <a href="index.html#events" class="nav-link">Sự kiện</a>
    <a href="index.html#tiers" class="nav-link">Gói hội viên</a>
    <a href="ai-chat.html" class="nav-link">Trợ lý AI</a>
  </div>
  <div class="nav-right">
    <a href="login.html" class="btn">Đăng nhập</a>
    <a href="register.html" class="btn btn-primary"><i class="ti ti-user-plus" aria-hidden="true"></i> Đăng ký hội viên</a>
  </div>
</nav>

<div class="public-container">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;flex-wrap:wrap;gap:1rem">
    <div>
      <h1 style="font-family:var(--font-title);font-size:26px;font-weight:700;color:var(--text-primary);display:flex;align-items:center;gap:10px"><i class="ti ti-users" style="color:var(--primary)"></i> Thư mục doanh nghiệp hội viên</h1>
      <p style="font-size:12px;color:var(--text-secondary);margin-top:4px">Khám phá các doanh nghiệp thành viên đáng tin cậy trong mạng lưới BizHub.</p>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <input type="text" id="main-search" placeholder="Tìm kiếm tên, ngành, email..." oninput="filterMembers(this.value)" style="padding:8px 12px;border-radius:8px;border:1px solid var(--border-strong);font-size:12px;width:260px;outline:none">
      <a href="register.html" class="btn btn-primary"><i class="ti ti-user-plus" aria-hidden="true"></i> Đăng ký ngay</a>
    </div>
  </div>

  <div id="members-list" style="display:grid;grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));gap:20px">
    <div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--text-muted)"><i class="ti ti-loader animate-spin" style="font-size:24px;display:block;margin:0 auto 10px"></i> Đang tải danh sách hội viên...</div>
  </div>
</div>

<script src="js/i18n.js"></script>
<script src="js/app.js"></script>
<script>
let members = [];
let searchQ = '';

const getInitialsColors = (name) => {
  const sum = name.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
  const colors = [
    { bg: '#E6F1FB', fg: '#0C447C' },
    { bg: '#EAF3DE', fg: '#27500A' },
    { bg: '#FAEEDA', fg: '#633806' },
    { bg: '#EEEDFE', fg: '#3C3489' },
    { bg: '#E1F5EE', fg: '#085041' },
    { bg: '#FAECE7', fg: '#712B13' }
  ];
  return colors[sum % colors.length];
};

async function loadMembers() {
  try {
    const res = await fetch('/api/members?status=approved');
    if (!res.ok) throw new Error('Không thể tải danh sách hội viên');
    const data = await res.json();
    
    members = data.data.map(m => {
      const colors = getInitialsColors(m.name);
      return {
        id: m.id,
        name: m.name,
        initials: m.name.split(' ').filter(Boolean).map(n => n[0]).join('').slice(0, 2).toUpperCase(),
        bg: colors.bg,
        fg: colors.fg,
        tier: m.tier,
        industry: m.industry || 'Chưa phân loại',
        email: m.email || 'Chưa cập nhật',
        desc: m.description || 'Chưa có mô tả chi tiết hoạt động kinh doanh.',
        date: new Date(m.created_at).toLocaleDateString('vi-VN')
      };
    });
    renderMembers();
  } catch (err) {
    console.error(err);
    document.getElementById('members-list').innerHTML = `<div class="empty" style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--text-muted)"><i class="ti ti-alert-triangle" style="font-size:24px;display:block;margin-bottom:8px"></i> Lỗi tải dữ liệu hội viên: ${err.message}</div>`;
  }
}

function renderMembers() {
  const list = members.filter(m => {
    if (searchQ && !m.name.toLowerCase().includes(searchQ) && !m.industry.toLowerCase().includes(searchQ) && !m.email.toLowerCase().includes(searchQ)) return false;
    return true;
  });

  const el = document.getElementById('members-list');
  if (!list.length) {
    el.innerHTML = '<div class="empty" style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--text-muted)"><i class="ti ti-search" style="font-size:24px;display:block;margin-bottom:8px"></i> Không tìm thấy hội viên nào phù hợp.</div>';
    return;
  }

  el.innerHTML = list.map(m => {
    const tierBadge = m.tier === 'platinum' ? '💎 Platinum' : m.tier === 'gold' ? '🏅 Gold' : '🪙 Silver';
    const tierClass = m.tier === 'platinum' ? 'b-platinum' : m.tier === 'gold' ? 'b-gold' : 'b-silver';
    return `
      <div class="card" style="box-shadow:var(--shadow); transition:var(--transition); border-radius:var(--radius-lg); position:relative; overflow:hidden; display:flex; flex-direction:column">
        <div style="height:60px; background:linear-gradient(135deg, ${m.bg} 0%, rgba(255,255,255,0) 100%); border-bottom:1px solid var(--border)"></div>
        <div style="padding:1.25rem; margin-top:-35px; display:flex; flex-direction:column; flex:1">
          <div class="av-circle" style="background:${m.bg}; color:${m.fg}; width:54px; height:54px; font-size:16px; border:3px solid #ffffff; margin-bottom:12px; font-weight:600">${m.initials}</div>
          <h3 style="font-family:var(--font-title); font-size:15px; font-weight:600; color:var(--text-primary); margin-bottom:4px; line-height:1.3">${m.name}</h3>
          <div style="font-size:11px; color:var(--text-muted); margin-bottom:10px; display:flex; align-items:center; gap:4px">
            <i class="ti ti-briefcase"></i> ${m.industry}
          </div>
          <p style="font-size:12px; color:var(--text-secondary); line-height:1.6; margin-bottom:15px; flex:1">${m.desc}</p>
          <div style="border-top:1px solid var(--border); padding-top:12px; display:flex; align-items:center; justify-content:space-between; margin-top:auto">
            <span class="badge ${tierClass}">${tierBadge}</span>
            <a href="mailto:${m.email}" class="btn" style="font-size:11px; padding:4px 10px; border-radius:6px"><i class="ti ti-mail"></i> Liên hệ</a>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function filterMembers(q) {
  searchQ = q.toLowerCase();
  renderMembers();
}

document.addEventListener('DOMContentLoaded', loadMembers);
</script>
</body>
</html>
