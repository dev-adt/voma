<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BizHub — Đăng nhập hệ thống</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="css/main.css">
<style>
  body {
    background-color: #0F172A;
    color: #F8FAFC;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .login-container {
    width: 100%;
    max-width: 400px;
    padding: 1.5rem;
    z-index: 10;
  }
  .glass-card {
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    border-radius: 16px;
    padding: 2.5rem 2.25rem;
    position: relative;
    overflow: hidden;
  }
  .logo-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-bottom: 2rem;
    text-align: center;
  }
  .logo-icon {
    width: 50px;
    height: 50px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    box-shadow: 0 8px 20px var(--primary-glow);
  }
  .logo-name {
    font-family: var(--font-title);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #FFFFFF;
  }
  .logo-sub {
    font-size: 11px;
    color: #64748B;
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .input-group {
    position: relative;
    margin-bottom: 1.25rem;
  }
  .input-label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: #94A3B8;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .input-wrapper {
    position: relative;
  }
  .input-wrapper input {
    width: 100%;
    padding: 10px 12px 10px 36px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(255, 255, 255, 0.02);
    color: #FFFFFF;
    font-family: inherit;
    font-size: 13px;
    outline: none;
    transition: var(--transition);
  }
  .input-wrapper input:focus {
    border-color: var(--primary);
    background: rgba(255, 255, 255, 0.05);
    box-shadow: 0 0 0 3px var(--primary-glow);
  }
  .input-wrapper i {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 15px;
    color: #475569;
    transition: var(--transition);
  }
  .input-wrapper input:focus + i {
    color: var(--primary);
  }
  .btn-submit {
    width: 100%;
    padding: 10px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: #ffffff;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: var(--transition);
    box-shadow: 0 8px 16px var(--primary-glow);
    font-family: inherit;
    outline: none;
  }
  .btn-submit:hover {
    transform: translateY(-1px);
    box-shadow: 0 12px 20px var(--primary-glow);
  }
  .btn-submit:active {
    transform: translateY(0);
  }
  .error-box {
    background: rgba(239, 68, 68, 0.1);
    border: 0.5px solid rgba(239, 68, 68, 0.25);
    color: #FCA5A5;
    font-size: 12px;
    padding: 8px 12px;
    border-radius: 8px;
    margin-bottom: 1.25rem;
    display: none;
    align-items: center;
    gap: 6px;
    line-height: 1.4;
  }
  .footer-text {
    text-align: center;
    font-size: 11px;
    color: #475569;
    margin-top: 1.5rem;
  }
</style>
</head>
<body>

<!-- Background Blur Spots -->
<div style="position:fixed;top:-10%;left:-10%;width:350px;height:350px;background:radial-gradient(circle, rgba(79,70,229,0.15) 0%, rgba(79,70,229,0) 70%);border-radius:50%;z-index:1;filter:blur(30px);pointer-events:none"></div>
<div style="position:fixed;bottom:-10%;right:-10%;width:400px;height:400px;background:radial-gradient(circle, rgba(16,185,129,0.12) 0%, rgba(16,185,129,0) 70%);border-radius:50%;z-index:1;filter:blur(30px);pointer-events:none"></div>

<div class="login-container">
  <div class="glass-card">
    <div class="logo-block">
      <div class="logo-icon"><i class="ti ti-building-community"></i></div>
      <div>
        <div class="logo-name">BizHub AI</div>
        <div class="logo-sub">Hệ thống quản trị hội viên</div>
      </div>
    </div>

    <div class="error-box" id="error-box">
      <i class="ti ti-circle-x" style="font-size: 14px;"></i>
      <span id="error-msg">Tên đăng nhập hoặc mật khẩu không chính xác.</span>
    </div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="input-group">
        <label class="input-label" for="username">Tài khoản</label>
        <div class="input-wrapper">
          <input type="text" id="username" placeholder="Tên đăng nhập admin..." required autofocus autocomplete="username">
          <i class="ti ti-user"></i>
        </div>
      </div>

      <div class="input-group" style="margin-bottom: 1.5rem;">
        <label class="input-label" for="password">Mật khẩu</label>
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="Mật khẩu..." required autocomplete="current-password">
          <i class="ti ti-lock"></i>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="btn-text">
        <i class="ti ti-login"></i> Đăng nhập hệ thống
      </button>
    </form>

    <div class="footer-text">
      BizHub AI &middot; Phiên bản Bảo mật 2.0
    </div>
  </div>
</div>

<script>
async function handleLogin(e) {
  e.preventDefault();
  const errorBox = document.getElementById('error-box');
  const errorMsg = document.getElementById('error-msg');
  const btn = document.getElementById('btn-text');

  errorBox.style.display = 'none';
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader animate-spin"></i> Đang xác thực...';

  const user = document.getElementById('username').value.trim();
  const pass = document.getElementById('password').value;

  try {
    const res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: user, password: pass })
    });

    const data = await res.json();
    if (!res.ok) {
      throw new Error(data.error || 'Đăng nhập thất bại.');
    }

    // Lưu credentials
    localStorage.setItem('bizhub_admin_token', data.token);
    localStorage.setItem('bizhub_admin_user', JSON.stringify(data.admin));

    // Redirect về trang chủ quản lý
    window.location.href = 'admin-dashboard.html';
  } catch (err) {
    errorMsg.textContent = err.message;
    errorBox.style.display = 'flex';
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-login"></i> Đăng nhập hệ thống';
  }
}
</script>

</body>
</html>
