<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BizHub — Bảng tin & Cơ hội</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="css/main.css?v=2.0">
</head>
<body class="public-body">

<!-- Decorative background gradient blobs -->
<div style="position:fixed;top:-20%;left:-10%;width:50vw;height:50vw;background:radial-gradient(circle, rgba(79,70,229,0.06) 0%, rgba(79,70,229,0) 70%);z-index:-1;pointer-events:none;border-radius:50%"></div>
<div style="position:fixed;bottom:-20%;right:-10%;width:60vw;height:60vw;background:radial-gradient(circle, rgba(16,185,129,0.04) 0%, rgba(16,185,129,0) 70%);z-index:-1;pointer-events:none;border-radius:50%"></div>

<nav>
  <div class="nav-logo">
    <div class="nav-logo-icon"><i class="ti ti-building-community" aria-hidden="true"></i></div>
    BizHub
  </div>
  <div class="nav-links">
    <a href="index.html#features" class="nav-link">Tính năng</a>
    <a href="index.html#members" class="nav-link">Hội viên</a>
    <a href="index.html#posts" class="nav-link">Bài viết</a>
    <a href="index.html#events" class="nav-link">Sự kiện</a>
    <a href="index.html#tiers" class="nav-link">Gói hội viên</a>
    <a href="ai-chat.html" class="nav-link">Trợ lý AI</a>
  </div>
  <div class="nav-right">
    <a href="member-login.html" class="btn">Đăng nhập</a>
    <a href="register.html" class="btn btn-primary"><i class="ti ti-user-plus" aria-hidden="true"></i> Đăng ký hội viên</a>
  </div>
</nav>

<div class="public-container">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;flex-wrap:wrap;gap:1rem">
    <div>
      <h1 style="font-family:var(--font-title);font-size:26px;font-weight:700;color:var(--text-primary);display:flex;align-items:center;gap:10px"><i class="ti ti-news" style="color:var(--primary)"></i> Tin bài & Cơ hội giao thương</h1>
      <p style="font-size:12px;color:var(--text-secondary);margin-top:4px">Cập nhật tin tức, nhu cầu hợp tác kinh tế, tuyển dụng mới nhất từ hội viên.</p>
    </div>
    <div style="display:flex;gap:8px">
      <input type="text" id="main-search" placeholder="Tìm bài viết, đối tác..." oninput="filterPosts(this.value)" style="padding:8px 12px;border-radius:8px;border:1px solid var(--border-strong);font-size:12px;width:260px;outline:none">
    </div>
  </div>

  <div id="posts-list" style="display:flex;flex-direction:column;gap:16px">
    <div style="text-align:center;padding:3rem;color:var(--text-muted)"><i class="ti ti-loader animate-spin" style="font-size:24px;display:block;margin-bottom:8px"></i> Đang tải bài viết...</div>
  </div>
</div>

<!-- Modal xem bài -->
<div id="post-modal" style="display:none;position:fixed;inset:0;background:rgba(15,23,42,0.3);z-index:200;align-items:flex-start;justify-content:center;padding:2rem 1rem;backdrop-filter:blur(4px)">
  <div class="card" style="width:100%;max-width:560px;max-height:80vh;overflow-y:auto;background:var(--surface-2);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg)">
    <div style="padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface-2);z-index:10">
      <div style="font-family:var(--font-title);font-size:14px;font-weight:600;color:var(--text-primary)" id="modal-title">Chi tiết bài viết</div>
      <button onclick="closeModal()" style="background:none;border:none;cursor:pointer;font-size:18px;color:var(--text-muted)"><i class="ti ti-x"></i></button>
    </div>
    <div style="padding:1.5rem" id="modal-body"></div>
    <div style="padding:1rem 1.25rem;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end" id="modal-footer">
      <button class="btn btn-primary" onclick="closeModal()">Đóng</button>
    </div>
  </div>
</div>

<script src="js/i18n.js"></script>
<script src="js/app.js"></script>
<script>
let posts = [];
let searchQ = '';

const getInitialsColors = (name) => {
  const sum = name.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
  const colors = [
    { bg: '#E6F1FB', fg: '#0C447C' },
    { bg: '#EAF3DE', fg: '#27500A' },
    { bg: '#FAEEDA', fg: '#633806' },
    { bg: '#EEEDFE', fg: '#3C3489' },
    { bg: '#E1F5EE', fg: '#085041' },
    { bg: '#FAECE7', fg: '#712B13' }
  ];
  return colors[sum % colors.length];
};

async function loadPosts() {
  try {
    const res = await fetch('/api/posts?status=approved');
    if (!res.ok) throw new Error('Không thể tải danh sách bài viết');
    const data = await res.json();
    
    posts = data.data.map(p => {
      const colors = p.company_name ? getInitialsColors(p.company_name) : { bg: '#E6F1FB', fg: '#0C447C' };
      return {
        id: p.id,
        memberId: p.member_id,
        company: p.company_name || 'Hội viên ẩn danh',
        initials: p.company_name ? p.company_name.split(' ').filter(Boolean).map(n => n[0]).join('').slice(0, 2).toUpperCase() : 'HV',
        bg: colors.bg,
        fg: colors.fg,
        title: p.title,
        summary: p.summary || '',
        body: p.body,
        type: p.type || 'Bài viết',
        contact: p.contact_info,
        tags: p.tags ? (typeof p.tags === 'string' ? JSON.parse(p.tags) : p.tags) : [],
        date: new Date(p.created_at).toLocaleDateString('vi-VN')
      };
    });
    render();
  } catch (err) {
    console.error(err);
    document.getElementById('posts-list').innerHTML = `<div class="empty" style="text-align:center;padding:2rem;color:var(--text-muted)"><i class="ti ti-alert-triangle" style="font-size:24px;display:block;margin-bottom:8px"></i> Lỗi tải bài viết: ${err.message}</div>`;
  }
}

function render() {
  const list = posts.filter(p => {
    if (searchQ && !p.title.toLowerCase().includes(searchQ) && !p.company.toLowerCase().includes(searchQ)) return false;
    return true;
  });

  const el = document.getElementById('posts-list');
  if (!list.length) {
    el.innerHTML = '<div class="empty" style="text-align:center;padding:3rem;color:var(--text-muted)"><i class="ti ti-news" style="font-size:24px;display:block;margin-bottom:8px"></i> Không tìm thấy bài viết nào phù hợp.</div>';
    return;
  }

  el.innerHTML = list.map(p => `
    <div class="card" style="box-shadow:var(--shadow); transition:var(--transition); border-color:var(--border)">
      <div style="padding:1.25rem">
        <div style="display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap">
          <div class="av-circle" style="background:${p.bg};color:${p.fg};flex-shrink:0;font-weight:600;width:40px;height:40px">${p.initials}</div>
          <div style="flex:1;min-width:240px">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap">
              <span style="font-size:12px;font-weight:600;color:var(--text-primary)">${p.company}</span>
              <span style="font-size:11px;color:var(--text-muted)">· ${p.date}</span>
            </div>
            <h3 style="font-family:var(--font-title);font-size:14px;font-weight:600;margin-bottom:6px;line-height:1.4;color:var(--text-primary)">${p.title}</h3>
            <p style="font-size:12px;color:var(--text-secondary);line-height:1.6">${p.summary}</p>
            <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:10px">
              ${(p.tags || []).map(t => `<span style="background:var(--primary-bg);border:0.5px solid rgba(79,70,229,0.1);border-radius:99px;font-size:10px;padding:2px 8px;color:var(--primary);font-weight:500">${t}</span>`).join('')}
            </div>
          </div>
          <div style="display:flex;align-items:center;flex-shrink:0;margin-left:auto">
            <button class="btn" style="font-size:12px;padding:6px 14px" onclick="viewPost(${p.id})"><i class="ti ti-eye"></i> Đọc bài</button>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function filterPosts(q) {
  searchQ = q.toLowerCase();
  render();
}

function viewPost(id) {
  const p = posts.find(x => x.id === id);
  if (!p) return;
  
  document.getElementById('modal-title').textContent = p.title;
  document.getElementById('modal-body').innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <div class="av-circle" style="background:${p.bg};color:${p.fg};font-weight:600;width:40px;height:40px">${p.initials}</div>
      <div>
        <div style="font-weight:600;font-size:13px;color:var(--text-primary)">${p.company}</div>
        <div style="font-size:11px;color:var(--text-muted)">${p.date} · <span class="badge b-pending" style="font-size:9px;background:var(--primary-bg);color:var(--primary);border:none">${p.type}</span></div>
      </div>
    </div>
    <h2 style="font-family:var(--font-title);font-size:16px;font-weight:700;margin-bottom:10px;color:var(--text-primary);line-height:1.4">${p.title}</h2>
    <div style="font-size:13px;color:var(--text-secondary);line-height:1.8;margin-bottom:16px;white-space:pre-line">${p.body}</div>
    ${p.contact ? `<div style="padding:10px 14px;background:var(--bg-base);border-radius:8px;font-size:12px;color:var(--text-secondary);border:1px solid var(--border);display:flex;align-items:center;gap:8px"><i class="ti ti-phone" style="font-size:15px;color:var(--primary)"></i> <span>Thông tin liên hệ: <strong>${p.contact}</strong></span></div>` : ''}
  `;
  document.getElementById('post-modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('post-modal').style.display = 'none';
}

document.addEventListener('DOMContentLoaded', loadPosts);
</script>
</body>
</html>
